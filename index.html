<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siono</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
        radial-gradient(circle at top left,#8b0000 0%,transparent 40%),
        radial-gradient(circle at bottom right,#081b44 0%,transparent 40%),
        linear-gradient(135deg,#000000,#081b44,#8b0000);
    overflow-y:auto;
    padding:20px 0;
}

.container{
    text-align:center;
    color:white;
    max-width:1100px;
    width:90%;
    padding:50px;
    animation:fadeIn 1.2s ease;
}

h1{
font-size:clamp(2rem,5vw,3.5rem);
    margin-bottom:30px;
    line-height:1.2;
    text-shadow:0 0 20px rgba(255,255,255,.3);
}

p{
    font-size:1.35rem;
    margin-bottom:40px;
    color:#f0f0f0;
}

.imagen{
    width:min(380px,60vw,40vh);
    height:min(380px,60vw,40vh);
    object-fit:cover;
    border-radius:30px;
    border:4px solid rgba(255,255,255,.8);
    box-shadow:
        0 0 40px rgba(255,255,255,.15),
        0 0 80px rgba(255,0,80,.15);
    margin-bottom:35px;
    animation:float 4s ease-in-out infinite;
}

.botones{
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
}

button{
    border:none;
    cursor:pointer;
    transition:.4s;
}

#si{
    background:linear-gradient(45deg,#ff004c,#ff6b81);
    color:white;
    font-size:26px;
    padding:20px 65px;
    border-radius:18px;
    box-shadow:0 0 25px rgba(255,0,80,.45);
}

#no{
    background:linear-gradient(45deg,#123c75,#4ea8ff);
    color:white;
    font-size:26px;
    padding:20px 65px;
    border-radius:18px;
    box-shadow:0 0 25px rgba(0,140,255,.35);
}

#si:hover,
#no:hover{
    transform:translateY(-5px) scale(1.05);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-12px);
    }
}

.corazones{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    pointer-events:none;
}

.corazon{
    position:absolute;
    color:rgba(255,255,255,.15);
    animation:subir linear infinite;
}

@keyframes subir{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-100px);
    }
}

/* RESPONSIVE PARA CELULAR */

@media (max-width:768px){

    body{
        overflow-y:auto;
    }

    .container{
        width:95%;
        padding:25px;
    }

    h1{
        font-size:2.2rem;
        margin-bottom:20px;
    }

    p{
        font-size:1.05rem;
        margin-bottom:25px;
    }

    .imagen{
        width:70vw;
        height:70vw;
        margin-bottom:35px;
    }

    .botones{
        gap:15px;
    }

    #si,
    #no{
        font-size:18px;
        padding:15px 35px;
    }

}

</style>
</head>
<body>

<div class="corazones"></div>

<div class="container">

    <h1>Esto es un regalito para ti, con mucho cariño</h1>

    <p>
        ¿Quieres verlo? (pon que no)
    </p>

    <img
    class="imagen"
    src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?w=600"
    alt="amor">

    <div class="botones">
        <button id="si">Sí ❤️</button>
        <button id="no">No 😔</button>
    </div>

</div>

<script>

let escala = 1;

const botonSi = document.getElementById("si");
const botonNo = document.getElementById("no");

botonNo.addEventListener("click", () => {

    escala += 0.5;

    botonSi.style.transform = `scale(${escala})`;

    if(escala >= 8){

        botonSi.style.position = "fixed";
        botonSi.style.top = "0";
        botonSi.style.left = "0";
        botonSi.style.width = "100vw";
        botonSi.style.height = "100vh";
        botonSi.style.borderRadius = "0";

        if(window.innerWidth <= 768){
            botonSi.style.fontSize = "40px";
        }else{
            botonSi.style.fontSize = "70px";
        }

        botonSi.style.transform = "none";
        botonSi.innerHTML = "SÍ ❤️";
        botonNo.style.display = "none";
    }

});

botonSi.addEventListener("click", () => {
    window.location.href = "si.html";
});

const corazones = document.querySelector(".corazones");

for(let i=0;i<30;i++){

    const corazon = document.createElement("div");

    corazon.innerHTML = "❤";

    corazon.classList.add("corazon");

    corazon.style.left = Math.random()*100 + "%";

    corazon.style.fontSize =
    (Math.random()*25 + 15) + "px";

    corazon.style.animationDuration =
    (Math.random()*10 + 8) + "s";

    corazones.appendChild(corazon);
}

</script>

</body>
</html>
